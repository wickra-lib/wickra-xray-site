# lychee external-link checker config (see .github/workflows/links.yml).
# Only http(s) URLs are checked; relative/internal links resolve via --root-dir.
# Loopback and private addresses are skipped.

max_retries = 3
retry_wait_time = 2
timeout = 20

# Treat these as success: OK, partial content, and rate-limited (transient).
accept = [200, 206, 429]

scheme = ["https", "http"]
exclude_all_private = true

# Known false positives (valid URLs; lychee can't verify them):
# - config.ts builds the per-page canonical with a `${path}` template literal;
#   lychee scans the .ts as text and extracts the unevaluated placeholder
#   (reported as /$%7Bpath%7D), which is not a real URL.
# - crates.io and npmjs.com return 403/404 to non-browser requests
#   (anti-scraping); the package pages are live in a browser.
exclude = [
  'wickra\.org/\$(\{|%7B)path',
  'crates\.io/crates/',
  'www\.npmjs\.com/package/',
  # wickra-xray is not published to any registry yet; these resolve once the
  # first release lands. Excluded so the scheduled link check stays green until
  # then. Remove on release.
  'pypi\.org/project/wickra-xray',
  'nuget\.org/packages/WickraXray',
  'central\.sonatype\.com/artifact/org\.wickra/wickra-xray',
  'pkg\.go\.dev/github\.com/wickra-lib/wickra-xray-go',
  'docs\.rs/wickra-xray',
  'wickra-lib\.r-universe\.dev',
]
