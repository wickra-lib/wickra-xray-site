name: CI

# Build the VitePress site on every push and pull request so a broken config,
# component or content page is caught before Cloudflare Pages deploys it. The
# deploy itself is handled by Cloudflare's Git integration, not by this workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build
