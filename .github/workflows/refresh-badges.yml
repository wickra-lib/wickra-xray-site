name: Refresh status badges

# Snapshots the repo-status badge SVGs (CI, codecov, registry versions, …) into
# public/badges/ so the site serves them from its own origin instead of
# hot-linking the badge hosts at page load. Runs hourly and commits only when a
# badge actually changed; the commit triggers a Cloudflare Pages deploy. The
# site build never fetches these, so a badge-host outage can never break a
# deploy — see scripts/fetch-badges.mjs.
on:
  schedule:
    - cron: '17 * * * *' # hourly at :17
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-badges
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Fetch badge snapshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-badges.mjs

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain public/badges .vitepress/theme/badges.json)" ]; then
            echo "badges unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "wickra-bot"
          git config user.email "wickra-bot@users.noreply.github.com"
          git add public/badges .vitepress/theme/badges.json
          git commit -m "chore: refresh status badge snapshots"
          # sync-about.yml pushes version strings to this repo on release tags;
          # rebase onto anything it pushed in the meantime so the two never clash
          # on push (the plain push raced and failed at release time).
          git pull --rebase origin main
          git push
